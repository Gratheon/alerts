services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postgres
    ports:
      - "5307:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql
      - ./test/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d alerts"]
      interval: 5s
      timeout: 3s
      retries: 10

  alerts:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ENV_ID=dev
      - NODE_ENV=test
      - CI=true
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=test
      - DB_PASSWORD=test
      - DB_NAME=alerts
    ports:
      - "4561:4560"
    volumes:
      - .:/app/
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run build && node /app/app/alerts.js"

volumes:
  postgres-test-data:
